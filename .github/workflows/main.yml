name: OIDC Token Test
on: [push]
permissions:
  id-token: write
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Get OIDC Token
        run: |
          OIDC_TOKEN=$(curl -s -H \
          "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
          "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=api://AzureADTokenExchange")
          echo "Response: $OIDC_TOKEN"
