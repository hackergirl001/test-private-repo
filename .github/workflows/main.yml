name: Entrypoint Injection Test
on: [push]
jobs:
  test:
    runs-on: ubuntu-latest
    services:
      myservice:
        image: alpine:latest
        entrypoint: ["sh", "-c"]
        command: ["echo 'INJECTED' && env && sleep 30"]
    steps:
      - name: Check Service Output
        run: |
          echo "=== CHECKING SERVICE CONTAINER ==="
          docker ps -a
          echo "=== SERVICE LOGS ==="
          docker logs $(docker ps -aq --filter "ancestor=alpine:latest") 2>&1 || true
          echo "=== NETWORK INFO ==="
          cat /etc/hosts
          echo "=== CHECKING SERVICE ENV ==="
          docker exec $(docker ps -q --filter "ancestor=alpine:latest") env 2>&1 || true
